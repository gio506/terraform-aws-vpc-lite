name: terraform-ci

on:
  push:
  pull_request:

jobs:
  structure-check:
    name: Stage 1 - Structure check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify required files
        shell: bash
        run: |
          test -f README.md || {
            echo "Missing README.md"
            exit 1
          }
          test -f main.tf || {
            echo "Missing main.tf"
            exit 1
          }
          test -f variables.tf || {
            echo "Missing variables.tf"
            exit 1
          }
          test -f outputs.tf || {
            echo "Missing outputs.tf"
            exit 1
          }
          test -f versions.tf || {
            echo "Missing versions.tf"
            exit 1
          }
          test -d modules || {
            echo "Missing modules directory"
            exit 1
          }

  fmt_check:
    name: Stage 2 - Terraform Fmt Check
    runs-on: ubuntu-latest
    needs: structure-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Fmt Check
        run: terraform fmt -check -recursive

  validate:
    name: Stage 3 - Terraform Validate
    runs-on: ubuntu-latest
    needs: fmt_check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  lint:
    name: Stage 4 - TFLint
    runs-on: ubuntu-latest
    needs: validate
    env:
      TF_IN_AUTOMATION: true
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Terraform Init
        run: terraform init -backend=false

      - name: TFLint
        run: tflint --init && tflint

  plan:
    name: Stage 5 - Terraform Plan
    runs-on: ubuntu-latest
    needs: lint
    env:
      TF_IN_AUTOMATION: true
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Plan (simulation when no AWS creds)
        shell: bash
        run: |
          if [[ -n "${AWS_ACCESS_KEY_ID}" && -n "${AWS_SECRET_ACCESS_KEY}" && -n "${AWS_REGION}" ]]; then
            echo "AWS credentials detected: running real no-apply plan"
            terraform plan -input=false -lock=false -no-color -out=tfplan
          else
            echo "AWS credentials missing: running offline simulation plan"
            terraform plan -refresh=false -input=false -lock=false -no-color || true
          fi

  final-status-gate:
    name: Stage 6 - Final status gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - structure-check
      - fmt_check
      - validate
      - lint
      - plan
    steps:
      - name: Aggregate results
        shell: bash
        env:
          STRUCTURE: ${{ needs.structure-check.result }}
          FMT: ${{ needs.fmt_check.result }}
          VALIDATE: ${{ needs.validate.result }}
          LINT: ${{ needs.lint.result }}
          PLAN: ${{ needs.plan.result }}
        run: |
          for result in "$STRUCTURE" "$FMT" "$VALIDATE" "$LINT" "$PLAN"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              exit 1
            fi
          done
